<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" width="900" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#07040f"/>
      <stop offset="50%"  style="stop-color:#110d1e"/>
      <stop offset="100%" style="stop-color:#07040f"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#A78BFA"/>
      <stop offset="50%"  style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#7C3AED;stop-opacity:0"/>
      <stop offset="30%"  style="stop-color:#A78BFA"/>
      <stop offset="70%"  style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#140d2a"/>
      <stop offset="100%" style="stop-color:#07040f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="40"  x2="900" y2="40"  stroke="#7C3AED" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.12"/>
  <line x1="0" y1="80"  x2="900" y2="80"  stroke="#7C3AED" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.12"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#7C3AED" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.12"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#7C3AED" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.12"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#7C3AED" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.07"/>

  <!-- Pipeline connector -->
  <line x1="50" y1="163" x2="850" y2="163" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Arrow connectors (terraform workflow) -->
  <line x1="158" y1="163" x2="193" y2="163" stroke="#A78BFA" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <polygon points="193,159 201,163 193,167" fill="#A78BFA" opacity="0.85"/>

  <line x1="313" y1="163" x2="348" y2="163" stroke="#7C3AED" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.36s" repeatCount="indefinite"/>
  </line>
  <polygon points="348,159 356,163 348,167" fill="#7C3AED" opacity="0.85"/>

  <line x1="468" y1="163" x2="503" y2="163" stroke="#6D28D9" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.72s" repeatCount="indefinite"/>
  </line>
  <polygon points="503,159 511,163 503,167" fill="#6D28D9" opacity="0.85"/>

  <line x1="623" y1="163" x2="658" y2="163" stroke="#7C3AED" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="1.08s" repeatCount="indefinite"/>
  </line>
  <polygon points="658,159 666,163 658,167" fill="#7C3AED" opacity="0.85"/>

  <line x1="778" y1="163" x2="813" y2="163" stroke="#A78BFA" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="1.44s" repeatCount="indefinite"/>
  </line>
  <polygon points="813,159 821,163 813,167" fill="#A78BFA" opacity="0.85"/>

  <!-- Node: init -->
  <rect x="50"  y="143" width="108" height="40" rx="7" fill="url(#nodeGrad)" stroke="#7C3AED" stroke-width="1.5" filter="url(#glow)"/>
  <text x="104" y="157" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#A78BFA" font-weight="bold">init</text>
  <text x="104" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#C4B5FD">providers · backend</text>

  <!-- Node: plan -->
  <rect x="201" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#7C3AED" stroke-width="1.5" filter="url(#glow)"/>
  <text x="257" y="157" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#A78BFA" font-weight="bold">plan</text>
  <text x="257" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#C4B5FD">preview changes</text>

  <!-- Node: apply (pulse) -->
  <rect x="356" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#7C3AED" stroke-width="1.5" filter="url(#glow)"/>
  <text x="412" y="157" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#A78BFA" font-weight="bold">apply</text>
  <text x="412" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#C4B5FD">deploy infra</text>
  <rect x="356" y="143" width="112" height="40" rx="7" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="7;13;7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Node: state -->
  <rect x="511" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#6D28D9" stroke-width="1.5" filter="url(#glow)"/>
  <text x="567" y="157" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#A78BFA" font-weight="bold">state</text>
  <text x="567" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#C4B5FD">S3 · DynamoDB lock</text>

  <!-- Node: modules -->
  <rect x="666" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#6D28D9" stroke-width="1.5" filter="url(#glow)"/>
  <text x="722" y="157" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#A78BFA" font-weight="bold">modules</text>
  <text x="722" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#C4B5FD">reuse · compose</text>

  <!-- Node: CI/CD -->
  <rect x="821" y="143" width="79" height="40" rx="7" fill="url(#nodeGrad)" stroke="#7C3AED" stroke-width="1.5" filter="url(#glow)"/>
  <text x="860" y="157" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#A78BFA" font-weight="bold">CI/CD</text>
  <text x="860" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#C4B5FD">automate</text>

  <!-- Top bar -->
  <rect x="200" y="38" width="500" height="1.5" fill="url(#lineGrad)" rx="1">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <text x="450" y="68" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#3B0764" letter-spacing="8">INFRASTRUCTURE AS CODE</text>

  <text x="450" y="128" text-anchor="middle" font-family="'Courier New', monospace" font-size="40" font-weight="bold" fill="url(#titleGrad)" filter="url(#softglow)" letter-spacing="2">TERRAFORM MASTERY</text>

  <line x1="50" y1="232" x2="850" y2="232" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.4"/>
  <text x="450" y="222" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#3B0764" letter-spacing="4">HCL  ·  STATE  ·  MODULES  ·  AWS  ·  CI/CD</text>
</svg>
