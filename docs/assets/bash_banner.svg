<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" width="900" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0f0c04"/>
      <stop offset="50%"  style="stop-color:#1a160a"/>
      <stop offset="100%" style="stop-color:#0f0c04"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#FCD34D"/>
      <stop offset="50%"  style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#F59E0B;stop-opacity:0"/>
      <stop offset="30%"  style="stop-color:#FCD34D"/>
      <stop offset="70%"  style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#1f1a08"/>
      <stop offset="100%" style="stop-color:#0f0c04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="40"  x2="900" y2="40"  stroke="#F59E0B" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.1"/>
  <line x1="0" y1="80"  x2="900" y2="80"  stroke="#F59E0B" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.1"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#F59E0B" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.1"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#F59E0B" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.1"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#F59E0B" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.07"/>

  <!-- Pipeline connector -->
  <line x1="50" y1="163" x2="850" y2="163" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Arrow connectors -->
  <line x1="158" y1="163" x2="193" y2="163" stroke="#FCD34D" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <polygon points="193,159 201,163 193,167" fill="#FCD34D" opacity="0.85"/>

  <line x1="313" y1="163" x2="348" y2="163" stroke="#F59E0B" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.36s" repeatCount="indefinite"/>
  </line>
  <polygon points="348,159 356,163 348,167" fill="#F59E0B" opacity="0.85"/>

  <line x1="468" y1="163" x2="503" y2="163" stroke="#D97706" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.72s" repeatCount="indefinite"/>
  </line>
  <polygon points="503,159 511,163 503,167" fill="#D97706" opacity="0.85"/>

  <line x1="623" y1="163" x2="658" y2="163" stroke="#F59E0B" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="1.08s" repeatCount="indefinite"/>
  </line>
  <polygon points="658,159 666,163 658,167" fill="#F59E0B" opacity="0.85"/>

  <line x1="778" y1="163" x2="813" y2="163" stroke="#FCD34D" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="1.44s" repeatCount="indefinite"/>
  </line>
  <polygon points="813,159 821,163 813,167" fill="#FCD34D" opacity="0.85"/>

  <!-- Node: Variables -->
  <rect x="50"  y="143" width="108" height="40" rx="7" fill="url(#nodeGrad)" stroke="#F59E0B" stroke-width="1.5" filter="url(#glow)"/>
  <text x="104" y="159" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#FCD34D" font-weight="bold">$Variables</text>
  <text x="104" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#FDE68A">strings · arrays</text>

  <!-- Node: Control -->
  <rect x="201" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#F59E0B" stroke-width="1.5" filter="url(#glow)"/>
  <text x="257" y="159" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#FCD34D" font-weight="bold">Control Flow</text>
  <text x="257" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#FDE68A">if · for · while</text>

  <!-- Node: Functions (pulse) -->
  <rect x="356" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#F59E0B" stroke-width="1.5" filter="url(#glow)"/>
  <text x="412" y="159" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#FCD34D" font-weight="bold">Functions</text>
  <text x="412" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#FDE68A">scope · return</text>
  <rect x="356" y="143" width="112" height="40" rx="7" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="7;13;7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Node: Error Handling -->
  <rect x="511" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#glow)"/>
  <text x="567" y="159" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#FCD34D" font-weight="bold">Error Handling</text>
  <text x="567" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#FDE68A">trap · set -e</text>

  <!-- Node: Cron -->
  <rect x="666" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#glow)"/>
  <text x="722" y="159" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#FCD34D" font-weight="bold">Automation</text>
  <text x="722" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#FDE68A">cron · schedules</text>

  <!-- Node: Deploy -->
  <rect x="821" y="143" width="79" height="40" rx="7" fill="url(#nodeGrad)" stroke="#F59E0B" stroke-width="1.5" filter="url(#glow)"/>
  <text x="860" y="159" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#FCD34D" font-weight="bold">Deploy</text>
  <text x="860" y="174" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#FDE68A">scripts</text>

  <!-- Top bar -->
  <rect x="200" y="38" width="500" height="1.5" fill="url(#lineGrad)" rx="1">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <text x="450" y="68" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#78350F" letter-spacing="8">AUTOMATE EVERYTHING</text>

  <text x="450" y="128" text-anchor="middle" font-family="'Courier New', monospace" font-size="40" font-weight="bold" fill="url(#titleGrad)" filter="url(#softglow)" letter-spacing="4">BASH SCRIPTING</text>

  <line x1="50" y1="232" x2="850" y2="232" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.4"/>
  <text x="450" y="222" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#78350F" letter-spacing="4">VARIABLES  ·  FUNCTIONS  ·  AUTOMATION  ·  REAL WORLD SCRIPTS</text>
</svg>
